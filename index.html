<!DOCTYPE html>
<html lang="en" id="html-root">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Guan-Ting Ye · Neural Signal OS</title>
<meta name="description" content="Portfolio of Guan-Ting Ye — Deep Tech Translator, AI Product Researcher, Cognitive Neuroscientist. ITRI/ISTI · NCCU · Emobot+." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@300;400;500&family=Syne:wght@400;700;800&family=Noto+Serif+TC:wght@400;700&family=Noto+Sans+TC:wght@400;500&display=swap" rel="stylesheet" />
<style>
/* ── Reset ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  --bg:        #070710;
  --bg-2:      #0d0d1a;
  --bg-3:      #050510;
  --surface:   rgba(255,255,255,0.04);
  --surface-2: rgba(255,255,255,0.07);
  --border:    rgba(255,255,255,0.08);
  --border-2:  rgba(255,255,255,0.14);
  --teal:      #00e5c0;
  --teal-dim:  rgba(0,229,192,0.12);
  --teal-mid:  rgba(0,229,192,0.25);
  --amber:     #ffb347;
  --amber-dim: rgba(255,179,71,0.12);
  --white:     #f0eff9;
  --gray:      rgba(240,239,249,0.58);
  --gray-dim:  rgba(240,239,249,0.25);
  --font-sans: 'Syne', sans-serif;
  --font-serif:'Instrument Serif', Georgia, serif;
  --font-mono: 'JetBrains Mono', monospace;
  --radius:    12px;
  --glow:      0 0 40px rgba(0,229,192,0.15);
  --trans:     all 0.3s cubic-bezier(0.25,0.46,0.45,0.94);
}

html.lang-zh {
  --font-sans: 'Noto Sans TC', sans-serif;
  --font-serif:'Noto Serif TC', serif;
}
html.lang-zh .hero-title,html.lang-zh .section-title,html.lang-zh .timeline-head,
html.lang-zh .card-title,html.lang-zh .contact-title,html.lang-zh .proj-title,
html.lang-zh .award-title-text { font-family: 'Noto Serif TC', serif; }
html.lang-zh body { font-family: 'Noto Sans TC', sans-serif; }

html { scroll-behavior: smooth; font-size: 17px; }
body {
  background: var(--bg);
  color: var(--white);
  font-family: var(--font-sans);
  overflow-x: hidden;
  cursor: none;
}
@media (max-width: 768px) { body { cursor: auto; } }
a,button { cursor: none; }
@media (max-width: 768px) { a,button { cursor: pointer; } }

/* ── Cursor ── */
#cursor-dot {
  position: fixed; top: 0; left: 0; width: 8px; height: 8px;
  background: var(--teal); border-radius: 50%;
  pointer-events: none; z-index: 9999;
  transform: translate(-50%,-50%);
  transition: width 0.2s, height 0.2s, background 0.2s;
}
#cursor-ring {
  position: fixed; top: 0; left: 0; width: 36px; height: 36px;
  border: 1px solid rgba(0,229,192,0.5); border-radius: 50%;
  pointer-events: none; z-index: 9998;
  transform: translate(-50%,-50%);
  transition: width 0.3s, height 0.3s, border-color 0.3s;
}
.cursor-hover #cursor-dot { width: 14px; height: 14px; background: var(--amber); }
.cursor-hover #cursor-ring { width: 56px; height: 56px; border-color: var(--amber); }
@media (max-width: 768px) { #cursor-dot,#cursor-ring { display: none; } }

/* ── Progress Bar ── */
#progress {
  position: fixed; top: 0; left: 0; height: 2px;
  background: linear-gradient(90deg, var(--teal), var(--amber));
  z-index: 1000; transition: width 0.08s linear;
  box-shadow: 0 0 8px var(--teal);
}

/* ── Canvas ── */
#neural-canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.55; }

/* ── Page Transition ── */
.page-enter { animation: pageEnter 0.45s cubic-bezier(0.25,0.46,0.45,0.94) forwards; }
@keyframes pageEnter { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:none} }

/* ── Navigation ── */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 900;
  padding: 20px 48px;
  display: flex; align-items: center; justify-content: space-between;
  background: linear-gradient(to bottom, rgba(7,7,16,0.96) 0%, transparent 100%);
  transition: backdrop-filter 0.3s, background 0.3s, padding 0.3s;
}
nav.scrolled {
  padding: 13px 48px;
  background: rgba(7,7,16,0.94);
  backdrop-filter: blur(24px);
  border-bottom: 1px solid var(--border);
}
.nav-brand {
  font-family: var(--font-mono); font-size: 13px;
  color: var(--teal); letter-spacing: 0.08em; text-decoration: none;
  display: flex; align-items: center; gap: 10px;
}
.nav-brand-dot {
  width: 6px; height: 6px; background: var(--teal);
  border-radius: 50%; animation: pulse 2s ease infinite; flex-shrink: 0;
}
@keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(0,229,192,0.6)} 50%{box-shadow:0 0 0 8px transparent} }
.nav-right { display: flex; align-items: center; gap: 28px; }
.nav-links { display: flex; gap: 24px; list-style: none; }
.nav-links a {
  color: var(--gray); font-size: 13px; text-decoration: none;
  font-family: var(--font-mono); letter-spacing: 0.06em;
  transition: color 0.2s; padding: 4px 0; position: relative;
}
.nav-links a::after {
  content: ''; position: absolute; bottom: -2px; left: 0;
  width: 0; height: 1px; background: var(--teal);
  transition: width 0.25s cubic-bezier(0.25,0.46,0.45,0.94);
}
.nav-links a:hover { color: var(--teal); }
.nav-links a:hover::after { width: 100%; }

/* Lang Toggle — sliding pill */
.lang-toggle {
  position: relative; display: flex;
  border: 1px solid var(--border); border-radius: 20px; overflow: hidden;
  font-family: var(--font-mono); font-size: 11px;
}
.lang-pill {
  position: absolute; top: 0; bottom: 0; width: 50%;
  background: var(--teal); border-radius: 20px;
  transition: transform 0.25s cubic-bezier(0.25,0.46,0.45,0.94);
  z-index: 0; pointer-events: none;
}
.lang-btn {
  position: relative; z-index: 1;
  padding: 5px 14px; background: none; border: none;
  font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.06em;
  min-width: 44px; transition: color 0.25s;
}
.lang-btn.active { color: var(--bg); }
.lang-btn:not(.active) { color: var(--gray); }
.lang-btn:not(.active):hover { color: var(--teal); }

/* Hamburger */
.hamburger {
  display: none; flex-direction: column; gap: 5px;
  background: none; border: none; padding: 4px; cursor: none;
}
.hamburger span {
  display: block; width: 22px; height: 2px;
  background: var(--gray); border-radius: 2px;
  transition: var(--trans); transform-origin: center;
}
.hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
.hamburger.open span:nth-child(2) { opacity: 0; }
.hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

.mobile-menu {
  display: none; position: fixed; top: 56px; left: 0; right: 0;
  background: rgba(7,7,16,0.97); backdrop-filter: blur(24px);
  border-bottom: 1px solid var(--border); z-index: 890;
  padding: 24px 32px; flex-direction: column; gap: 16px;
}
.mobile-menu.open { display: flex; }
.mobile-menu a {
  color: var(--gray); font-family: var(--font-mono); font-size: 14px;
  text-decoration: none; padding: 10px 0; letter-spacing: 0.06em;
  border-bottom: 1px solid var(--border);
  opacity: 0; transform: translateX(-16px);
}
.mobile-menu.open a:nth-child(1) { animation: menuSlide 0.3s 0ms both; }
.mobile-menu.open a:nth-child(2) { animation: menuSlide 0.3s 50ms both; }
.mobile-menu.open a:nth-child(3) { animation: menuSlide 0.3s 100ms both; }
.mobile-menu.open a:nth-child(4) { animation: menuSlide 0.3s 150ms both; }
.mobile-menu.open a:nth-child(5) { animation: menuSlide 0.3s 200ms both; }
@keyframes menuSlide { to { opacity: 1; transform: none; } }
.mobile-menu a:hover { color: var(--teal); }
.mobile-menu-lang { display: flex; gap: 12px; margin-top: 8px; padding-top: 8px; }

@media (max-width: 768px) {
  nav { padding: 16px 24px; }
  nav.scrolled { padding: 12px 24px; }
  .nav-links,.lang-toggle { display: none; }
  .hamburger { display: flex; }
}

/* ── Layout ── */
section { position: relative; z-index: 10; }
.container { max-width: 1200px; margin: 0 auto; padding: 0 60px; }
@media (max-width: 960px) { .container { padding: 0 32px; } }
@media (max-width: 768px) { .container { padding: 0 24px; } }

.section-label {
  font-family: var(--font-mono); font-size: 12px; color: var(--teal);
  letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 20px;
  display: flex; align-items: center; gap: 12px;
}
.section-label::before { content:''; flex: 0 0 32px; height: 1px; background: var(--teal); }
.section-title {
  font-family: var(--font-serif); font-size: clamp(2.6rem,4.5vw,4rem);
  line-height: 1.12; margin-bottom: 80px; max-width: 720px;
}
.section-title em { font-style: italic; color: var(--teal); }

/* ── Reveal ── */
.reveal { opacity: 0; transform: translateY(28px); transition: opacity 0.7s, transform 0.7s; }
.reveal.visible { opacity: 1; transform: none; }
.reveal-delay-1 { transition-delay: 0.1s; }
.reveal-delay-2 { transition-delay: 0.2s; }
.reveal-delay-3 { transition-delay: 0.3s; }
.reveal-delay-4 { transition-delay: 0.4s; }

/* ── Keyframes ── */
@keyframes fadeUp  { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:none} }
@keyframes fadeIn  { from{opacity:0} to{opacity:1} }
@keyframes float   { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
@keyframes floatAlt{ 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
@keyframes featuredPulse {
  0%,100% { border-color: rgba(0,229,192,0.18); }
  50%     { border-color: rgba(0,229,192,0.42); box-shadow: 0 0 48px rgba(0,229,192,0.07); }
}

/* ── Hero ── */
.hero {
  min-height: 100vh; display: grid;
  grid-template-columns: 1fr 1fr; gap: 0; overflow: hidden;
}
.hero-left {
  display: flex; flex-direction: column; justify-content: center;
  padding: 150px 60px 100px;
}
.hero-status {
  display: flex; align-items: center; gap: 16px; margin-bottom: 28px;
  font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.1em;
  text-transform: uppercase;
  opacity: 0; animation: fadeUp 0.8s 0.2s forwards;
}
.status-item { display: flex; align-items: center; gap: 6px; }
.status-dot {
  width: 5px; height: 5px; border-radius: 50%; background: var(--teal);
  animation: pulse 2s ease infinite;
}
.status-dot.amber { background: var(--amber); animation: none; }
.status-active { color: var(--teal); }
.status-open   { color: var(--amber); }
.status-sep    { color: var(--gray-dim); }

.hero-eyebrow {
  font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.2em;
  color: var(--teal); text-transform: uppercase; margin-bottom: 24px;
  opacity: 0; animation: fadeUp 0.8s 0.35s forwards;
}
.hero-title {
  font-family: var(--font-serif); font-size: clamp(3.2rem,5vw,5.2rem);
  line-height: 1.08; font-weight: 400; margin-bottom: 28px;
  opacity: 0; animation: fadeUp 0.8s 0.5s forwards;
}
.hero-title em { font-style: italic; color: var(--teal); }
.hero-sub {
  font-family: var(--font-mono); font-size: 14px; line-height: 1.85;
  color: var(--gray); max-width: 480px; margin-bottom: 48px;
  opacity: 0; animation: fadeUp 0.8s 0.7s forwards;
  white-space: pre-line;
}
.hero-actions {
  display: flex; gap: 16px; flex-wrap: wrap;
  opacity: 0; animation: fadeUp 0.8s 0.9s forwards;
}
.btn-primary {
  padding: 13px 28px; background: var(--teal); color: var(--bg);
  font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.1em;
  text-transform: uppercase; text-decoration: none; border-radius: 4px;
  transition: box-shadow 0.3s, transform 0.2s; border: none;
  display: inline-flex; align-items: center; gap: 8px; font-weight: 500;
}
.btn-primary:hover { box-shadow: 0 0 36px rgba(0,229,192,0.5); transform: translateY(-2px); }
.btn-ghost {
  padding: 13px 28px; border: 1px solid var(--border); color: var(--gray);
  font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.1em;
  text-transform: uppercase; text-decoration: none; border-radius: 4px; background: none;
  transition: border-color 0.3s, color 0.3s, transform 0.2s;
  display: inline-flex; align-items: center; gap: 8px;
}
.btn-ghost:hover { border-color: var(--teal); color: var(--teal); transform: translateY(-2px); }

.hero-stats {
  display: flex; gap: 36px; margin-top: 56px; flex-wrap: wrap;
  opacity: 0; animation: fadeUp 0.8s 1.1s forwards;
}
.hero-stat { position: relative; padding-left: 0; }
.hero-stat + .hero-stat::before {
  content: ''; position: absolute; left: -18px; top: 4px; bottom: 4px;
  width: 1px; background: var(--border);
}
.stat-num { font-family: var(--font-serif); font-size: 2.8rem; color: var(--teal); line-height: 1; }
.stat-label { font-family: var(--font-mono); font-size: 10px; color: var(--gray-dim); letter-spacing: 0.1em; margin-top: 5px; }

.hero-right {
  position: relative; display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}
.hero-img-wrap {
  position: relative; width: 390px; height: 510px;
  opacity: 0; animation: fadeIn 1.2s 0.8s forwards;
}
.hero-img-wrap img {
  width: 100%; height: 100%; object-fit: cover; border-radius: 4px;
  filter: contrast(1.06) saturate(0.92);
}
.hero-img-glow {
  position: absolute; inset: -2px; border-radius: 6px;
  background: linear-gradient(135deg, var(--teal) 0%, transparent 55%, var(--amber) 100%);
  z-index: -1; opacity: 0.4;
}
.scan-line {
  position: absolute; inset: 0; pointer-events: none; z-index: 5;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.1) 2px, rgba(0,0,0,0.1) 4px);
}
.hero-coords {
  position: absolute; left: 12px; bottom: 20px;
  font-family: var(--font-mono); font-size: 10px; color: var(--amber);
  letter-spacing: 0.14em; opacity: 0.75;
  background: rgba(7,7,16,0.7); padding: 4px 10px; border-radius: 3px;
}
.data-tag {
  position: absolute; left: -36px; top: 80px;
  background: var(--bg-2); border: 1px solid var(--teal-dim);
  padding: 10px 16px; border-radius: 4px;
  font-family: var(--font-mono); font-size: 10px; color: var(--teal);
  letter-spacing: 0.1em; animation: float 3s ease-in-out infinite; white-space: nowrap;
}
.data-tag-2 {
  position: absolute; right: -24px; bottom: 110px;
  background: var(--bg-2); border: 1px solid var(--amber-dim);
  padding: 10px 16px; border-radius: 4px;
  font-family: var(--font-mono); font-size: 10px; color: var(--amber);
  letter-spacing: 0.1em; animation: floatAlt 4s ease-in-out 1s infinite; white-space: nowrap;
}

@media (max-width: 960px) {
  .hero { grid-template-columns: 1fr; }
  .hero-right { display: none; }
  .hero-left { padding: 130px 32px 80px; }
  .hero-stats { gap: 24px; }
  .hero-stat + .hero-stat::before { left: -12px; }
}

/* ── Story / Timeline ── */
.story {
  padding: 140px 0;
  background: linear-gradient(to bottom, var(--bg) 0%, var(--bg-2) 50%, var(--bg) 100%);
}
.timeline { position: relative; padding-left: 52px; }
.timeline::before {
  content: ''; position: absolute; left: 0; top: 8px; bottom: 8px;
  width: 1px; background: linear-gradient(to bottom, transparent, var(--teal) 20%, var(--teal) 80%, transparent);
}
.timeline-item {
  position: relative; margin-bottom: 72px;
  opacity: 0; transform: translateX(-20px);
  transition: opacity 0.6s, transform 0.6s;
}
.timeline-item.visible { opacity: 1; transform: none; }
.timeline-dot {
  position: absolute; left: -60px; top: 6px;
  width: 16px; height: 16px; background: var(--bg);
  border: 2px solid var(--teal); border-radius: 50%;
  transition: background 0.3s, box-shadow 0.3s;
}
.timeline-item[data-type="industry"] .timeline-dot,
.timeline-item[data-type="product"] .timeline-dot {
  border-radius: 2px; transform: rotate(45deg);
  width: 14px; height: 14px; left: -57px; top: 7px;
}
.timeline-item:hover .timeline-dot { background: var(--teal); box-shadow: 0 0 16px var(--teal); }
.timeline-meta { font-family: var(--font-mono); font-size: 11px; color: var(--teal); letter-spacing: 0.1em; margin-bottom: 10px; }
.timeline-head { font-family: var(--font-serif); font-size: 1.65rem; margin-bottom: 14px; line-height: 1.2; }
.timeline-body { font-family: var(--font-mono); font-size: 14px; line-height: 1.9; color: var(--gray); max-width: 600px; }
.chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 16px; }
.chip {
  padding: 4px 14px; border: 1px solid var(--border); border-radius: 20px;
  font-family: var(--font-mono); font-size: 11px; color: var(--gray-dim);
  letter-spacing: 0.05em; transition: border-color 0.2s, color 0.2s;
}
.chip:hover { border-color: var(--teal); color: var(--teal); }

/* ── Work Grid ── */
.work { padding: 140px 0; background: var(--bg); }
.work-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 60px; }
.project-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 36px; cursor: none;
  transition: border-color 0.3s, transform 0.3s, box-shadow 0.3s;
  position: relative; overflow: hidden; text-decoration: none; color: inherit;
  display: block;
}
.project-card::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(circle at var(--mx,50%) var(--my,50%), rgba(0,229,192,0.06) 0%, transparent 60%);
  opacity: 0; transition: opacity 0.3s;
}
.project-card:hover { border-color: rgba(0,229,192,0.3); transform: translateY(-4px); box-shadow: 0 24px 64px rgba(0,0,0,0.4), 0 0 0 1px rgba(0,229,192,0.15); }
.project-card:hover::before { opacity: 1; }
.project-card.featured { grid-column: span 2; animation: featuredPulse 3.5s ease-in-out infinite; }
.featured-inner { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
.project-card.coming-soon { opacity: 0.4; cursor: default; pointer-events: none; border-style: dashed; }
.card-label { font-family: var(--font-mono); font-size: 11px; color: var(--teal); letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 18px; }
.card-title { font-family: var(--font-serif); font-size: 1.7rem; margin-bottom: 16px; line-height: 1.2; }
.card-desc { font-family: var(--font-mono); font-size: 13px; line-height: 1.9; color: var(--gray); }
.card-stack { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 24px; }
.stack-tag {
  padding: 3px 10px; background: var(--teal-dim); border-radius: 3px;
  font-family: var(--font-mono); font-size: 10px; color: var(--teal); letter-spacing: 0.05em;
}
.card-arrow {
  position: absolute; right: 28px; bottom: 28px;
  font-size: 20px; color: var(--teal); opacity: 0; transform: translate(4px,4px);
  transition: opacity 0.3s, transform 0.3s;
}
.project-card:hover .card-arrow { opacity: 1; transform: none; }
.card-num { font-family: var(--font-mono); font-size: 52px; color: var(--border); margin-bottom: 18px; line-height: 1; }
.card-outcomes { list-style: none; margin-top: 16px; }
.card-outcomes li {
  padding: 10px 0; border-bottom: 1px solid var(--border);
  font-family: var(--font-mono); font-size: 13px; color: var(--gray);
  line-height: 1.75; display: flex; gap: 12px;
}
.card-outcomes li::before { content: '→'; color: var(--teal); flex-shrink: 0; }
.card-outcomes li:last-child { border-bottom: none; }
@media (max-width: 960px) {
  .work-grid { grid-template-columns: 1fr; }
  .project-card.featured { grid-column: 1; }
  .featured-inner { grid-template-columns: 1fr; gap: 24px; }
  .project-card { padding: 28px; }
}

/* ── Skills ── */
.skills { padding: 120px 0; background: var(--bg-2); }
.skills-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 28px; margin-top: 60px; }
.skill-group {
  padding: 32px; border: 1px solid var(--border); border-radius: var(--radius);
  transition: border-color 0.3s, box-shadow 0.3s; position: relative; overflow: hidden;
}
.skill-group::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, var(--teal), var(--amber));
  opacity: 0; transition: opacity 0.3s;
}
.skill-group:hover::before { opacity: 1; }
.skill-group:hover { border-color: rgba(0,229,192,0.2); box-shadow: var(--glow); }
.skill-group-title { font-family: var(--font-mono); font-size: 12px; color: var(--teal); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 20px; }
.skill-items { display: flex; flex-wrap: wrap; gap: 8px; }
.skill-tag {
  padding: 6px 13px; border: 1px solid var(--border); border-left: 2px solid var(--teal-mid);
  border-radius: 4px; font-family: var(--font-mono); font-size: 12px; color: var(--gray);
  transition: var(--trans);
}

const NeuralCanvas = React.memo(function () {
    const rafRef = useRef(null);
    useEffect(() => {
        const canvas = document.getElementById('neural-canvas');
        const ctx = canvas?.getContext('2d');
        const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        const isSmallOrTouch = window.innerWidth < 960 || window.matchMedia('(pointer: coarse)').matches;
        if (!canvas || !ctx || prefersReducedMotion || isSmallOrTouch) {

            return undefined;
        }
        let width = 0;
        let height = 0;
        let nodes = [];
        let resizeRaf = null;
        let isRunning = true;
        const mouse = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
        const CONNECTION_DISTANCE = 112;
        const SPEED = 0.22;
        const getNodeCount = () => Math.max(26, Math.min(42, Math.round((window.innerWidth * window.innerHeight) / 52000)));
        const createNodes = () => {
            const count = getNodeCount();
            nodes = Array.from({ length: count }, () => ({
                x: Math.random() * width,
                y: Math.random() * height,
                vx: (Math.random() - 0.5) * SPEED,
                vy: (Math.random() - 0.5) * SPEED,
                r: Math.random() * 1.3 + 0.5,
            }));
        };
        const resize = () => {
            const dpr = Math.min(window.devicePixelRatio || 1, 1.5);
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = Math.floor(width * dpr);
            canvas.height = Math.floor(height * dpr);
            canvas.style.width = `${width}px`;
            canvas.style.height = `${height}px`;
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            createNodes();
        };
        const requestResize = () => {
            if (resizeRaf)
                return;
            resizeRaf = requestAnimationFrame(() => {
                resizeRaf = null;
                resize();
            });
        };
        const onPointerMove = event => {
            mouse.x = event.clientX;
            mouse.y = event.clientY;
        };
        const draw = () => {
            if (!isRunning)
                return;
            ctx.clearRect(0, 0, width, height);
            for (const node of nodes) {
                node.x += node.vx;
                node.y += node.vy;
                if (node.x < 0 || node.x > width)
                    node.vx *= -1;
                if (node.y < 0 || node.y > height)
                    node.vy *= -1;
                const dx = mouse.x - node.x;
                const dy = mouse.y - node.y;
                const d = Math.hypot(dx, dy);
                if (d < 90) {
                    node.x += dx * 0.003;
                    node.y += dy * 0.003;
                }
            }
            for (let i = 0; i < nodes.length; i += 1) {
                for (let j = i + 1; j < nodes.length; j += 1) {
                    const dx = nodes[i].x - nodes[j].x;
                    const dy = nodes[i].y - nodes[j].y;
                    const d = Math.hypot(dx, dy);
                    if (d < CONNECTION_DISTANCE) {
                        ctx.beginPath();
                        ctx.strokeStyle = `rgba(0,229,192,${(1 - d / CONNECTION_DISTANCE) * 0.14})`;
                        ctx.lineWidth = 0.75;
                        ctx.moveTo(nodes[i].x, nodes[i].y);
                        ctx.lineTo(nodes[j].x, nodes[j].y);
                        ctx.stroke();
                    }
                }
                ctx.beginPath();
                ctx.arc(nodes[i].x, nodes[i].y, nodes[i].r, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(0,229,192,0.44)';
                ctx.fill();
            }
            rafRef.current = requestAnimationFrame(draw);
        };
        const onVisibilityChange = () => {
            isRunning = !document.hidden;
            if (isRunning && !rafRef.current)
                draw();
            if (!isRunning) {
                cancelAnimationFrame(rafRef.current);
                rafRef.current = null;
            }
        };
        resize();
        draw();
        window.addEventListener('resize', requestResize, { passive: true });
        window.addEventListener('pointermove', onPointerMove, { passive: true });
        document.addEventListener('visibilitychange', onVisibilityChange);
        return () => {
            isRunning = false;
            cancelAnimationFrame(rafRef.current);
            cancelAnimationFrame(resizeRaf);
            window.removeEventListener('resize', requestResize);
            window.removeEventListener('pointermove', onPointerMove);
            document.removeEventListener('visibilitychange', onVisibilityChange);
        };
    }, []);
    return null;

function Cursor() {
    useEffect(() => {
        const dot = document.getElementById('cursor-dot');
        const ring = document.getElementById('cursor-ring');
        const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        const isTouchDevice = window.matchMedia('(pointer: coarse)').matches;
        if (!dot || !ring || prefersReducedMotion || isTouchDevice)
            return undefined;
        let mx = window.innerWidth / 2;
        let my = window.innerHeight / 2;
        let rx = mx;
        let ry = my;
        let rafId;
        const LERP = 0.14;
        const interactiveSelector = 'a,button,.project-card';
        const onMove = event => {
            mx = event.clientX;
            my = event.clientY;
            dot.style.transform = `translate(${mx - 4}px, ${my - 4}px)`;
        };
        const onPointerOver = event => {
            if (event.target.closest(interactiveSelector))
                document.body.classList.add('cursor-hover');
        };
        const onPointerOut = event => {
            if (event.target.closest(interactiveSelector))
                document.body.classList.remove('cursor-hover');
        };
        const loop = () => {
            rx += (mx - rx) * LERP;
            ry += (my - ry) * LERP;
            ring.style.transform = `translate(${Math.round(rx - 18)}px, ${Math.round(ry - 18)}px)`;
            rafId = requestAnimationFrame(loop);
        };
        loop();
        window.addEventListener('pointermove', onMove, { passive: true });
        document.addEventListener('pointerover', onPointerOver);
        document.addEventListener('pointerout', onPointerOut);
        return () => {
            cancelAnimationFrame(rafId);
            window.removeEventListener('pointermove', onMove);
            document.removeEventListener('pointerover', onPointerOver);
            document.removeEventListener('pointerout', onPointerOut);
        };
    }, []);
    return null;
}

function ProgressBar() {
    useEffect(() => {
        const bar = document.getElementById('progress');
        if (!bar)
            return undefined;
        let ticking = false;
        const update = () => {
            const maxScroll = document.documentElement.scrollHeight - window.innerHeight;
            const progress = maxScroll > 0 ? (document.documentElement.scrollTop / maxScroll) * 100 : 0;
            bar.style.width = `${Math.min(100, Math.max(0, progress))}%`;
            ticking = false;
        };
        const onScroll = () => {
            if (!ticking) {
                ticking = true;
                requestAnimationFrame(update);
            }
        };
        update();
        window.addEventListener('scroll', onScroll, { passive: true });
        return () => window.removeEventListener('scroll', onScroll);
    }, []);
    return null;
}

function useReveal(deps = []) {
    useEffect(() => {
        const els = document.querySelectorAll('.reveal,.timeline-item');
        const io = new IntersectionObserver(entries => {
            entries.forEach(e => { if (e.isIntersecting) {
                e.target.classList.add('visible');
                io.unobserve(e.target);
            } });

        els.forEach(el => io.observe(el));
        return () => io.disconnect();
    }, deps);
}
